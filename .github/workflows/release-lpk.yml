name: Release LPK

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install lzc-cli
        run: npm install -g @lazycatcloud/lzc-cli

      - name: Build LPK
        run: |
          tag="${GITHUB_REF_NAME}"
          lzc-cli project release -o "${tag}.lpk"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "${tag}" "${tag}.lpk" \
            --title "${tag}" \
            --notes "Release ${tag}" \
            --verify-tag
