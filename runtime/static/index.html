<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="lzcapp-navigation-bar-scheme" content="hidden" />
    <title>LCMD WebShell</title>
    <link rel="stylesheet" href="./static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="tabs-bar">
        <div class="tabs-strip">
          <button class="tab-overview-toggle" id="tabOverviewToggle" type="button" aria-label="终端总览" aria-expanded="false" title="终端总览">
            <svg class="topbar-icon tab-overview-toggle-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <rect x="4" y="4" width="6" height="6" rx="1.5"></rect>
              <rect x="14" y="4" width="6" height="6" rx="1.5"></rect>
              <rect x="4" y="14" width="6" height="6" rx="1.5"></rect>
              <rect x="14" y="14" width="6" height="6" rx="1.5"></rect>
            </svg>
          </button>
          <div class="mobile-active-tab-title" id="mobileActiveTabTitle" aria-live="polite">终端</div>
          <div class="tabs" id="tabs" role="tablist" aria-label="Terminal tabs"></div>
          <button class="tab-add" id="newTab" type="button" aria-label="New tab" title="New tab">
            <svg class="topbar-icon tab-add-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
        </div>
        <div class="header-actions">
          <div class="instance-switcher" id="instanceSwitcher">
            <button class="instance-switcher-btn" id="instanceSwitcherButton" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="切换容器">
              <svg class="topbar-icon instance-switcher-menu-icon icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path d="M4 7h16M4 12h16M4 17h16"></path>
              </svg>
            </button>
            <div class="instance-switcher-panel" id="instanceSwitcherPanel" hidden>
              <div class="instance-switcher-panel-head">
                <div class="instance-switcher-panel-title">终端管理</div>
              </div>
              <div class="instance-switcher-actions">
                <button class="instance-switcher-action" id="homeMenuButton" type="button">
                  <span class="instance-switcher-item-body">
                    <span class="instance-switcher-item-name">首页</span>
                    <span class="instance-switcher-item-meta">返回 LightOS 首页</span>
                  </span>
                </button>
                <button class="instance-switcher-action" id="settingsMenuButton" type="button">
                  <span class="instance-switcher-item-body">
                    <span class="instance-switcher-item-name">设置</span>
                    <span class="instance-switcher-item-meta">打开应用设置</span>
                  </span>
                </button>
              </div>
              <div class="instance-switcher-panel-head">
                <div class="instance-switcher-panel-title">切换容器</div>
              </div>
              <div class="instance-switcher-list" id="instanceSwitcherList" role="listbox" aria-label="容器实例"></div>
              <div class="instance-switcher-feedback" id="instanceSwitcherFeedback" hidden></div>
            </div>
          </div>
        </div>
      </header>
      <main class="terminal-area" id="terminalArea">
        <div class="search-panel" id="searchPanel" hidden>
          <input class="search-input" id="searchInput" type="search" autocomplete="off" spellcheck="false" aria-label="Search terminal" />
          <span class="search-count" id="searchCount">0/0</span>
          <button class="search-btn" id="searchPrevious" type="button" aria-label="Previous result">&uarr;</button>
          <button class="search-btn" id="searchNext" type="button" aria-label="Next result">&darr;</button>
          <button class="search-btn" id="searchClose" type="button" aria-label="Close search">&times;</button>
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <button class="empty-state-action" id="emptyStateAction" type="button" aria-label="New Terminal">New Terminal</button>
        </div>
      </main>
    </div>
    <div class="context-menu" id="contextMenu" hidden>
      <div class="context-menu-group" data-context-group="edit">
        <button class="context-menu-btn" type="button" data-action="copy">复制</button>
        <button class="context-menu-btn" type="button" data-action="paste">粘贴</button>
        <button class="context-menu-btn" type="button" data-action="select-all">全选</button>
        <button class="context-menu-btn" type="button" data-action="search">搜索</button>
      </div>
      <div class="context-menu-group" data-context-group="link">
        <button class="context-menu-btn" type="button" data-action="open-link">打开链接</button>
        <button class="context-menu-btn" type="button" data-action="copy-link">复制链接</button>
      </div>
      <div class="context-menu-group" data-context-group="tab">
        <button class="context-menu-btn" type="button" data-action="rename-tab">重命名标签</button>
        <button class="context-menu-btn" type="button" data-action="move-tab-first">移到最前</button>
        <button class="context-menu-btn" type="button" data-action="move-tab-left">左移标签</button>
        <button class="context-menu-btn" type="button" data-action="move-tab-right">右移标签</button>
        <button class="context-menu-btn" type="button" data-action="move-tab-last">移到最后</button>
        <button class="context-menu-btn" type="button" data-action="close-other-tabs">关闭其他标签</button>
      </div>
      <div class="context-menu-group" data-context-group="pane">
        <button class="context-menu-btn" type="button" data-action="split-vertical">左右分屏</button>
        <button class="context-menu-btn" type="button" data-action="split-horizontal">上下分屏</button>
        <button class="context-menu-btn" type="button" data-action="move-pane-new-tab">移动窗格到新标签</button>
      </div>
      <div class="context-menu-group" data-context-group="appearance">
        <button class="context-menu-btn" type="button" data-action="theme">切换主题</button>
      </div>
      <div class="context-menu-group" data-context-group="danger">
        <button class="context-menu-btn danger" type="button" data-action="close-pane">关闭窗格</button>
        <button class="context-menu-btn danger" type="button" data-action="close-tab">关闭标签</button>
      </div>
    </div>
    <div class="modal" id="themePickerBackdrop" hidden>
      <div class="theme-picker-panel" id="themePickerPanel" role="dialog" aria-modal="true" aria-label="切换主题">
        <div class="theme-picker-header">
          <button class="theme-picker-close" id="themePickerClose" type="button" aria-label="返回" title="返回">
            <svg t="1778863118461" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="17075" width="200" height="200" aria-hidden="true"><path d="M810.666667 469.333333H334.08l208.213333-208.213333a43.008 43.008 0 0 0 0-60.586667 42.666667 42.666667 0 0 0-60.16 0l-281.173333 281.173334a42.666667 42.666667 0 0 0 0 60.16l281.173333 281.173333a42.666667 42.666667 0 0 0 60.16-60.16L334.08 554.666667H810.666667a42.666667 42.666667 0 0 0 0-85.333334z" p-id="17076"></path></svg>
          </button>
          <h2>切换主题</h2>
        </div>
        <div class="theme-picker-scroll-frame">
          <div class="theme-picker-list" id="themePickerList" role="listbox" aria-label="终端主题"></div>
          <div class="theme-picker-scrollbar-sensor" id="themePickerScrollbarSensor" aria-hidden="true">
            <div class="theme-picker-scrollbar-track" id="themePickerScrollbarTrack">
              <div class="theme-picker-scrollbar-thumb" id="themePickerScrollbarThumb"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal settings-modal" id="settingsBackdrop" hidden>
      <div class="settings-panel" id="settingsPanel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-header">
          <h2 id="settingsTitle">设置</h2>
          <button class="settings-close" id="settingsClose" type="button" aria-label="关闭设置">&times;</button>
        </div>
        <div class="settings-feedback" id="settingsFeedback" hidden></div>
        <div class="settings-main">
          <div class="settings-tabs" role="tablist" aria-label="设置分类" aria-orientation="vertical">
            <button class="settings-tab" id="settingsTabTerminal" type="button" role="tab" aria-selected="true" aria-controls="settingsPanelTerminal" data-settings-tab="terminal">终端设置</button>
            <button class="settings-tab" id="settingsTabTheme" type="button" role="tab" aria-selected="false" aria-controls="settingsPanelTheme" data-settings-tab="theme">主题设置</button>
            <button class="settings-tab" id="settingsTabMobileShortcuts" type="button" role="tab" aria-selected="false" aria-controls="settingsPanelMobileShortcuts" data-settings-tab="mobile-shortcuts">手机快捷键设置</button>
          </div>
          <div class="settings-body">
            <div class="settings-tab-panel" id="settingsPanelTerminal" role="tabpanel" aria-labelledby="settingsTabTerminal" data-settings-panel="terminal">
              <section class="settings-section" aria-labelledby="settingsFontTitle">
                <div class="settings-section-head">
                  <h3 id="settingsFontTitle">字体</h3>
                  <div class="settings-font-actions">
                    <button class="settings-text-button danger" id="settingsFontDeleteSelectedButton" type="button" hidden>删除</button>
                    <button class="settings-icon-button" id="settingsFontEditButton" type="button" aria-label="编辑字体" title="编辑字体">
                      <svg t="1778913171859" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="7314" width="200" height="200" aria-hidden="true"><path d="M469.333333 128a42.666667 42.666667 0 0 1 0 85.333333H213.333333v597.333334h597.333334v-256l0.298666-4.992A42.666667 42.666667 0 0 1 896 554.666667v256a85.333333 85.333333 0 0 1-85.333333 85.333333H213.333333a85.333333 85.333333 0 0 1-85.333333-85.333333V213.333333a85.333333 85.333333 0 0 1 85.333333-85.333333z m414.72 12.501333a42.666667 42.666667 0 0 1 0 60.330667L491.861333 593.066667a42.666667 42.666667 0 0 1-60.330666-60.330667l392.192-392.192a42.666667 42.666667 0 0 1 60.330666 0z" fill="currentColor" p-id="7315"></path></svg>
                    </button>
                    <button class="settings-icon-button" id="settingsFontUploadButton" type="button" aria-label="上传字体" title="上传字体">
                      <svg t="1778911613156" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="6171" width="200" height="200" aria-hidden="true"><path d="M864 352H640v64h160v448H224V416h160v-64H160v576h704V352z" p-id="6172"></path><path d="M544 672V219.84l64.64 64 45.6-45.28-140.96-141.12-141.28 141.12 44.64 45.28 63.36-64V672h64z" p-id="6173"></path></svg>
                    </button>
                  </div>
                </div>
                <div class="settings-font-row">
                  <input class="settings-file" id="settingsFontInput" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2" multiple />
                  <div class="settings-font-cards" id="settingsFontCards" role="listbox" aria-label="终端字体"></div>
                </div>
              </section>
              <section class="settings-section" aria-labelledby="settingsScrollbackTitle">
                <div class="settings-section-head">
                  <h3 id="settingsScrollbackTitle">滚动历史</h3>
                </div>
                <div class="settings-number-row">
                  <label class="settings-number-label" for="settingsScrollbackInput">
                    <span>历史行数</span>
                    <span>刷新或新建终端后生效</span>
                  </label>
                  <div class="settings-number-control">
                    <input class="settings-number-input" id="settingsScrollbackInput" type="number" min="100" max="100000" step="1" inputmode="numeric" />
                    <button class="settings-icon-button" id="settingsScrollbackResetButton" type="button" aria-label="恢复默认滚动历史" title="恢复默认">
                      <svg t="1778915656350" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="8293" width="200" height="200" aria-hidden="true"><path d="M566.4 80c-195.2 0-358.4 131.2-412.8 307.2l-41.6-60.8c-16-19.2-44.8-25.6-67.2-9.6-22.4 16-25.6 44.8-12.8 67.2l108.8 153.6c6.4 9.6 12.8 16 22.4 19.2 3.2 0 6.4 3.2 6.4 3.2h6.4c3.2 0 9.6 0 12.8-3.2H192c3.2 0 6.4-3.2 9.6-6.4l156.8-112c22.4-16 25.6-44.8 12.8-67.2-16-22.4-44.8-25.6-67.2-12.8l-64 44.8c44.8-134.4 169.6-230.4 320-230.4 185.6 0 336 150.4 336 336s-150.4 336-336 336c-83.2 0-166.4-32-227.2-89.6-19.2-19.2-51.2-16-67.2 3.2-19.2 19.2-16 51.2 3.2 67.2 80 73.6 182.4 115.2 291.2 115.2 236.8 0 432-195.2 432-432S806.4 80 566.4 80z" fill="currentColor" p-id="8294"></path></svg>
                    </button>
                  </div>
                </div>
              </section>
              <section class="settings-section" aria-labelledby="settingsMouseTitle">
                <div class="settings-section-head">
                  <h3 id="settingsMouseTitle">鼠标</h3>
                </div>
                <label class="settings-switch-row" for="settingsDesktopMouseClipboardToggle">
                  <span class="settings-switch-label">
                    <span>鼠标选中复制、中键粘贴</span>
                    <span>桌面端左键选中后自动复制，中键粘贴剪贴板内容</span>
                  </span>
                  <input class="settings-switch-input" id="settingsDesktopMouseClipboardToggle" type="checkbox" checked />
                  <span class="settings-switch" aria-hidden="true"></span>
                </label>
              </section>
            </div>
            <div class="settings-tab-panel" id="settingsPanelTheme" role="tabpanel" aria-labelledby="settingsTabTheme" data-settings-panel="theme" hidden>
              <section class="settings-section settings-theme-section" aria-labelledby="settingsThemeTitle">
                <div class="settings-section-head">
                  <h3 id="settingsThemeTitle">终端主题</h3>
                </div>
                <div class="settings-theme-list" id="settingsThemeList" role="listbox" aria-label="终端主题"></div>
              </section>
            </div>
            <div class="settings-tab-panel" id="settingsPanelMobileShortcuts" role="tabpanel" aria-labelledby="settingsTabMobileShortcuts" data-settings-panel="mobile-shortcuts" hidden>
              <section class="settings-section settings-mobile-shortcuts-section" aria-labelledby="settingsMobileShortcutsTitle">
                <div class="settings-section-head">
                  <h3 id="settingsMobileShortcutsTitle">手机快捷键</h3>
                  <div class="settings-mobile-shortcut-actions">
                    <button class="settings-icon-button settings-mobile-shortcut-add-button" id="settingsMobileShortcutAddButton" type="button" aria-label="新增快捷键" title="新增快捷键">
                      <svg class="icon settings-mobile-shortcut-add-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2.4"></path></svg>
                    </button>
                    <button class="settings-icon-button settings-mobile-shortcut-reset-button" id="settingsMobileShortcutResetButton" type="button" aria-label="恢复默认手机快捷键" title="恢复默认">
                      <svg t="1778915656350" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="8293" width="200" height="200" aria-hidden="true"><path d="M566.4 80c-195.2 0-358.4 131.2-412.8 307.2l-41.6-60.8c-16-19.2-44.8-25.6-67.2-9.6-22.4 16-25.6 44.8-12.8 67.2l108.8 153.6c6.4 9.6 12.8 16 22.4 19.2 3.2 0 6.4 3.2 6.4 3.2h6.4c3.2 0 9.6 0 12.8-3.2H192c3.2 0 6.4-3.2 9.6-6.4l156.8-112c22.4-16 25.6-44.8 12.8-67.2-16-22.4-44.8-25.6-67.2-12.8l-64 44.8c44.8-134.4 169.6-230.4 320-230.4 185.6 0 336 150.4 336 336s-150.4 336-336 336c-83.2 0-166.4-32-227.2-89.6-19.2-19.2-51.2-16-67.2 3.2-19.2 19.2-16 51.2 3.2 67.2 80 73.6 182.4 115.2 291.2 115.2 236.8 0 432-195.2 432-432S806.4 80 566.4 80z" fill="currentColor" p-id="8294"></path></svg>
                    </button>
                  </div>
                </div>
                <div class="settings-mobile-shortcut-list" id="settingsMobileShortcutList" aria-label="手机快捷键列表"></div>
              </section>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="mobile-shortcut-editor" id="mobileShortcutEditor" hidden>
      <button class="mobile-shortcut-editor-scrim" id="mobileShortcutEditorScrim" type="button" aria-label="关闭"></button>
      <form class="mobile-shortcut-editor-panel" id="mobileShortcutEditorPanel" role="dialog" aria-modal="true" aria-labelledby="mobileShortcutEditorTitle">
        <h2 id="mobileShortcutEditorTitle">编辑快捷键</h2>
        <label class="mobile-shortcut-editor-field">
          <span>名称</span>
          <input id="mobileShortcutLabelInput" type="text" maxlength="16" autocomplete="off" />
        </label>
        <fieldset class="mobile-shortcut-editor-type" id="mobileShortcutTypeField">
          <legend>类型</legend>
          <label class="mobile-shortcut-type-card">
            <input class="mobile-shortcut-type-input" type="radio" name="mobileShortcutType" value="input" checked />
            <span>发送按键</span>
          </label>
          <label class="mobile-shortcut-type-card">
            <input class="mobile-shortcut-type-input" type="radio" name="mobileShortcutType" value="action" />
            <span>执行动作</span>
          </label>
        </fieldset>
        <label class="mobile-shortcut-editor-field" id="mobileShortcutKeyField">
          <span>按键</span>
          <select id="mobileShortcutKeySelect"></select>
        </label>
        <label class="mobile-shortcut-editor-field" id="mobileShortcutCustomKeyField" hidden>
          <span>字符</span>
          <input id="mobileShortcutCustomKeyInput" type="text" maxlength="2" autocomplete="off" />
        </label>
        <fieldset class="mobile-shortcut-editor-modifiers" id="mobileShortcutModifiersField">
          <legend>修饰键</legend>
          <label><input id="mobileShortcutCtrlInput" type="checkbox" /> Ctrl</label>
          <label><input id="mobileShortcutAltInput" type="checkbox" /> Alt</label>
          <label><input id="mobileShortcutShiftInput" type="checkbox" /> Shift</label>
        </fieldset>
        <label class="mobile-shortcut-editor-field" id="mobileShortcutActionField" hidden>
          <span>动作</span>
          <select id="mobileShortcutActionSelect"></select>
        </label>
        <div class="mobile-shortcut-editor-actions">
          <button class="settings-text-button danger" id="mobileShortcutEditorDelete" type="button" hidden>删除</button>
          <span class="mobile-shortcut-editor-action-spacer" aria-hidden="true"></span>
          <button class="settings-text-button" id="mobileShortcutEditorCancel" type="button">取消</button>
          <button class="settings-text-button" type="submit">保存</button>
        </div>
      </form>
    </div>
    <div class="tab-overview" id="tabOverview" hidden>
      <div class="tab-overview-panel" role="dialog" aria-modal="true" aria-label="终端总览">
        <div class="tab-overview-header">
          <button class="tab-overview-back" id="tabOverviewClose" type="button" aria-label="返回" title="返回">
            <svg t="1778863118461" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="17075" width="200" height="200" aria-hidden="true"><path d="M810.666667 469.333333H334.08l208.213333-208.213333a43.008 43.008 0 0 0 0-60.586667 42.666667 42.666667 0 0 0-60.16 0l-281.173333 281.173334a42.666667 42.666667 0 0 0 0 60.16l281.173333 281.173333a42.666667 42.666667 0 0 0 60.16-60.16L334.08 554.666667H810.666667a42.666667 42.666667 0 0 0 0-85.333334z" p-id="17076"></path></svg>
          </button>
          <h2>终端总览</h2>
          <button class="tab-overview-add" id="tabOverviewNewTab" type="button" aria-label="新建标签" title="新建标签">+</button>
        </div>
        <div class="tab-overview-grid" id="tabOverviewGrid" aria-label="终端标签"></div>
      </div>
    </div>
    <div class="dialog-backdrop" id="dialogBackdrop" hidden>
      <form class="dialog-panel" id="dialogPanel">
        <h2 class="dialog-title" id="dialogTitle">Confirm</h2>
        <p class="dialog-message" id="dialogMessage"></p>
        <input class="dialog-input" id="dialogInput" type="text" autocomplete="off" hidden />
        <div class="dialog-actions">
          <button class="dialog-cancel" id="dialogCancel" type="button">Cancel</button>
          <button class="dialog-ok" id="dialogOK" type="submit">OK</button>
        </div>
      </form>
    </div>
    <div class="mobile-shortcuts" id="mobileShortcuts" aria-label="Terminal shortcuts">
      <div class="mobile-shortcut-row" data-mobile-shortcut-row="top" role="toolbar" aria-label="Terminal shortcuts row 1"></div>
      <div class="mobile-shortcut-row" data-mobile-shortcut-row="bottom" role="toolbar" aria-label="Terminal shortcuts row 2"></div>
    </div>
    <div class="mobile-action-sheet" id="mobileActionSheet" hidden>
      <button class="mobile-action-sheet-scrim" id="mobileActionSheetScrim" type="button" aria-label="Close menu"></button>
      <section class="mobile-action-sheet-panel" role="dialog" aria-modal="true" aria-label="Terminal menu">
        <button class="mobile-action-sheet-handle" id="mobileActionSheetHandle" type="button" aria-label="Close menu">
          <span aria-hidden="true"></span>
        </button>
        <div class="mobile-action-grid" id="mobileActionGrid" role="menu" aria-label="Terminal menu actions"></div>
      </section>
    </div>
    <div class="mobile-close-confirm-sheet" id="mobileCloseConfirmSheet" hidden>
      <button class="mobile-close-confirm-scrim" id="mobileCloseConfirmScrim" type="button" aria-label="取消关闭"></button>
      <section class="mobile-close-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="mobileCloseConfirmTitle">
        <button class="mobile-close-confirm-handle" id="mobileCloseConfirmHandle" type="button" aria-label="取消关闭">
          <span aria-hidden="true"></span>
        </button>
        <h2 class="mobile-close-confirm-title" id="mobileCloseConfirmTitle">关闭标签？</h2>
        <p class="mobile-close-confirm-message" id="mobileCloseConfirmMessage"></p>
        <div class="mobile-close-confirm-actions">
          <button class="mobile-close-confirm-cancel" id="mobileCloseConfirmCancel" type="button">取消</button>
          <button class="mobile-close-confirm-ok" id="mobileCloseConfirmOK" type="button">关闭</button>
        </div>
      </section>
    </div>
    <div class="selection-sheet" id="selectionSheet" hidden>
