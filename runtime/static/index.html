<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LightOS Demo WebShell</title>
    <link rel="stylesheet" href="./static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="tabs-bar">
        <div class="tabs-strip">
          <div class="tabs" id="tabs" role="tablist" aria-label="Terminal tabs"></div>
          <button class="tab-add" id="newTab" type="button" aria-label="New tab" title="New tab">+</button>
        </div>
        <div class="header-actions">
          <div class="instance-switcher" id="instanceSwitcher">
            <button class="instance-switcher-btn" id="instanceSwitcherButton" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="切换容器">
              <span class="instance-switcher-current">
                <span class="instance-switcher-status-dot" id="instanceSwitcherStatusDot" data-status="unknown"></span>
                <span class="instance-switcher-name" id="instanceSwitcherName">容器</span>
              </span>
              <span class="instance-switcher-chevron" aria-hidden="true">v</span>
            </button>
            <div class="instance-switcher-panel" id="instanceSwitcherPanel" hidden>
              <div class="instance-switcher-panel-head">
                <div class="instance-switcher-panel-title">切换容器</div>
              </div>
              <div class="instance-switcher-list" id="instanceSwitcherList" role="listbox" aria-label="容器实例"></div>
              <button class="instance-switcher-action" id="themeMenuButton" type="button">切换主题</button>
              <div class="instance-switcher-feedback" id="instanceSwitcherFeedback" hidden></div>
            </div>
          </div>
        </div>
      </header>
      <main class="terminal-area" id="terminalArea">
        <div class="search-panel" id="searchPanel" hidden>
          <input class="search-input" id="searchInput" type="search" autocomplete="off" spellcheck="false" aria-label="Search terminal" />
          <span class="search-count" id="searchCount">0/0</span>
          <button class="search-btn" id="searchPrevious" type="button" aria-label="Previous result">&uarr;</button>
          <button class="search-btn" id="searchNext" type="button" aria-label="Next result">&darr;</button>
          <button class="search-btn" id="searchClose" type="button" aria-label="Close search">&times;</button>
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <button class="empty-state-action" id="emptyStateAction" type="button" aria-label="New Terminal">New Terminal</button>
        </div>
      </main>
    </div>
    <div class="context-menu" id="contextMenu" hidden>
      <button class="context-menu-btn" type="button" data-action="copy">Copy</button>
      <button class="context-menu-btn" type="button" data-action="paste">Paste</button>
      <button class="context-menu-btn" type="button" data-action="select-all">Select all</button>
      <button class="context-menu-btn" type="button" data-action="search">Search</button>
      <button class="context-menu-btn" type="button" data-action="open-link">Open link</button>
      <button class="context-menu-btn" type="button" data-action="copy-link">Copy link</button>
      <button class="context-menu-btn" type="button" data-action="rename-tab">Rename tab</button>
      <button class="context-menu-btn" type="button" data-action="move-tab-first">Move tab first</button>
      <button class="context-menu-btn" type="button" data-action="move-tab-left">Move tab left</button>
      <button class="context-menu-btn" type="button" data-action="move-tab-right">Move tab right</button>
      <button class="context-menu-btn" type="button" data-action="move-tab-last">Move tab last</button>
      <button class="context-menu-btn" type="button" data-action="close-other-tabs">Close other tabs</button>
      <button class="context-menu-btn" type="button" data-action="split-vertical">Split vertically</button>
      <button class="context-menu-btn" type="button" data-action="split-horizontal">Split horizontally</button>
      <button class="context-menu-btn" type="button" data-action="move-pane-new-tab">Move pane to new tab</button>
      <button class="context-menu-btn" type="button" data-action="theme">Theme</button>
      <button class="context-menu-btn danger" type="button" data-action="close-pane">Close pane</button>
      <button class="context-menu-btn danger" type="button" data-action="close-tab">Close tab</button>
    </div>
    <div class="modal" id="themePickerBackdrop" hidden>
      <div class="theme-picker-panel" id="themePickerPanel" role="dialog" aria-modal="true" aria-label="切换主题">
        <div class="theme-picker-header">
          <h2>切换主题</h2>
        </div>
        <div class="theme-picker-list" id="themePickerList" role="listbox" aria-label="终端主题"></div>
      </div>
    </div>
    <div class="dialog-backdrop" id="dialogBackdrop" hidden>
      <form class="dialog-panel" id="dialogPanel">
        <h2 class="dialog-title" id="dialogTitle">Confirm</h2>
        <p class="dialog-message" id="dialogMessage"></p>
        <input class="dialog-input" id="dialogInput" type="text" autocomplete="off" hidden />
        <div class="dialog-actions">
          <button class="dialog-cancel" id="dialogCancel" type="button">Cancel</button>
          <button class="dialog-ok" id="dialogOK" type="submit">OK</button>
        </div>
      </form>
    </div>
    <div class="mobile-shortcuts" id="mobileShortcuts" aria-label="Terminal shortcuts">
      <button type="button" data-mobile-action="ctrl">Ctrl</button>
      <button type="button" data-mobile-action="alt">Alt</button>
      <button type="button" data-mobile-action="shift">Shift</button>
      <button type="button" data-mobile-action="esc">Esc</button>
      <button type="button" data-mobile-action="tab">Tab</button>
      <button type="button" data-mobile-action="left">&larr;</button>
      <button type="button" data-mobile-action="down">&darr;</button>
      <button type="button" data-mobile-action="up">&uarr;</button>
      <button type="button" data-mobile-action="right">&rarr;</button>
      <button type="button" data-mobile-action="copy">Copy</button>
      <button type="button" data-mobile-action="paste">Paste</button>
      <button type="button" data-mobile-action="page-up">PgUp</button>
      <button type="button" data-mobile-action="page-down">PgDn</button>
      <button type="button" data-mobile-action="zoom-out">-</button>
      <button type="button" data-mobile-action="zoom-in">+</button>
    </div>
    <div class="selection-sheet" id="selectionSheet" hidden>
      <button type="button" data-selection-action="copy">Copy</button>
      <button type="button" data-selection-action="paste">Paste</button>
      <button type="button" data-selection-action="clear">Done</button>
    </div>
    <div class="network-banner" id="networkBanner" hidden>Offline. Reconnecting when network is back.</div>
    <div class="toast" id="toast" hidden></div>
    <script type="module" src="./static/main.js"></script>
  </body>
</html>
